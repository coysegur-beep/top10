name: Deploy a AWS S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite ejecutar manualmente

env:
  AWS_REGION: us-east-1
  S3_BUCKET: grupoempresarialatenas.com
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write  # para autenticación OIDC con AWS (recomendado)
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync archivos a S3 (con cache largo para assets)
        run: |
          # HTML, JSON, XML — sin cache (siempre fresco)
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --delete \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.json" \
            --include "*.txt"
          
          # Assets (CSS, JS, imágenes, fonts) — cache de 1 año
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.json" \
            --exclude "*.txt"

      - name: Invalidar cache de CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"

      - name: Notificar a Google de actualización del sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://grupoempresarialatenas.com/sitemap-index.xml" || true
          echo "✅ Sitemap notificado a Google"
