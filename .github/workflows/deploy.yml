name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1
  S3_BUCKET: topseguridadcolombia
  CLOUDFRONT_DISTRIBUTION_ID: EB6ASRFT0ZKF3
  SITE_URL: https://topseguridadcolombia.com

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync assets (long cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ --delete \
            --exclude "*.html" --exclude "*.xml" --exclude "robots.txt" \
            --cache-control "public, max-age=31536000, immutable"
      - name: Sync HTML (short cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --exclude "*" --include "*.html" --include "*.xml" --include "robots.txt" \
            --cache-control "public, max-age=300, s-maxage=3600"
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
